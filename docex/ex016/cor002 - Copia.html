<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configurações básicas globais para garantir que o gradiente ocupe toda a tela */
            height: 100%;
        }
        body {
            background: linear-gradient(to left, #0054E5 5%, #305391 35%, #282F3C 60%); /* Define o gradiente linear */
            background-repeat: no-repeat; /* Evita repetição do gradiente */    
            background-attachment: fixed; /* Mantém o gradiente fixo ao rolar a página */
            margin: 0; /* Remove margens padrão do body */
            color: white; /* Define a cor do texto como branco para contraste */
        }
    </style>
</head>

<body>
    <h1>Testando Gradiente</h1>

</body>

</html>
