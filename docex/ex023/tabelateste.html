<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela de Teste</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f0f0f0;
    }

    h1 {
        color: rgb(0, 0, 0);
        text-align: center;
        padding-bottom: 40px;
        font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        letter-spacing: 1px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.37);
    }

    table {
        margin: 20px auto;
        background-color: #fff;
        box-shadow: 5px 2px 5px rgba(0, 0, 0, 0.301);
        transition: 0.3s;
    }

    table:hover {
        transform: scale(1.05);
    }

    th {
        background-color: #4CAF50;
        color: white;
    }

    td.cruzeiro {
        background-color: #16bdff;
    }

    td.boca {
        background-color: #ff5733;
    }

    td.uni {
        background-color: #ffbd33;
    }

    td.barcelona {
        background-color: #33ff57;
    }

    td.pontos {
        text-align: center;
        color: #333;
        font-weight: bold;
    }

    td.pontos:hover {
        background-color: #8b33ff;
        color: white;
    }

    td:hover {
        background-color: #8b33ff;
        color: white;
    }


    table,
    th,
    td {
        border: 2px solid rgba(0, 0, 0, 0.479);
        border-collapse: collapse;
    }

    th,
    td {
        padding: 10px;
    }
</style>

<body>
    <h1>Tabela da Libertadores</h1>
    <table>
        <tr>
            <th>Time</th>
            <th>Pontos</th>
        </tr>
        <tr>
            <td class="cruzeiro">Cruzeiro</td>
            <td class="pontos">9</td>
        </tr>
        <tr>
            <td class="boca">Boca Juniors</td>
            <td class="pontos">6</td>
        </tr>
        <tr>
            <td class="uni">Uni. Católica</td>
            <td class="pontos">1</td>
        </tr>
        <tr>
            <td class="barcelona">Barcelona</td>
            <td class="pontos">0</td>
        </tr>

    </table>

</body>

</html>
