<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        div>p {
            display: none;
        }

        div:active>p {
            display: block;
            color: white;
            background-color: red;
            width: 300px;
        }

        div:hover {
            color: red;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre o texto abaixo para ver o efeito de hover.</p>
    <div>Clique neste texto!
        <p>TEXTO ESCONDIDO</p>
    </div>
    <p>Fim do exemplo.</p>

</body>

</html>
