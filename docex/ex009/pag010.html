<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../ex003/icon/porsche-ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="../estiloall/styleall.css">
    <title>Vídeos com HTML5</title>
</head>

<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>
    <video width="640" poster="imagens/capa.jpg" height="360" controls autoplay loop>
        <source src="midia/meu-video1.mp4" type="video/mp4">
        <p>Seu navegador não suporta o elemento de vídeo.</p>
    </video>
    <br>
    <hr>
    <video width="640" height="360" controls autoplay loop>
        <source src="midia/Meu-Video2.mp4" type="video/mp4">
        <p>Seu navegador não suporta o elemento de vídeo.</p>
    </video>
    <h1>Inserindo Vídeos do Youtube</h1>
    <p>Este vídeo está hospedado no Youtube.</p>
    <iframe width="640" height="315" src="https://www.youtube.com/embed/8XplngulPM4?si=inPaAVAQpEn7Yt4d"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>

</html>
